<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>降临之日</title>
  <meta name="description" content="一款中文文字冒险恐怖游戏。深夜醒来，回到公寓，在楼层异变与真假现实之间寻找出口。">
  <meta property="og:title" content="降临之日">
  <meta property="og:description" content="一款中文文字冒险恐怖游戏。深夜醒来，回到公寓，在楼层异变与真假现实之间寻找出口。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="t-app">
    <header class="t-header">
      <span class="t-brand">降临之日</span>
      <div class="t-header-right">
        <nav class="t-lang">
          <a class="t-lang-link t-lang-active" href="index.html">中文</a>
          <span class="t-lang-sep">·</span>
          <a class="t-lang-link" href="index-en.html">EN</a>
        </nav>
        <button id="menuButton" class="t-btn" type="button">菜单</button>
        <button id="restartButton" class="t-btn" type="button">重来</button>
      </div>
    </header>
    <div class="t-body">
      <div class="t-main">
        <div class="t-output" id="terminalOutput" aria-live="polite" aria-relevant="additions"></div>
        <div class="t-prompt-area">
          <div class="t-choices" id="terminalChoices"></div>
        </div>
      </div>
      <aside class="t-sidebar">
        <div class="t-sb-block">
          <p class="t-sb-label">位置</p>
          <p class="t-sb-value" id="sceneTitle">—</p>
        </div>
        <div class="t-sb-block">
          <p class="t-sb-label">目标</p>
          <p class="t-sb-value" id="objectiveText">—</p>
        </div>
        <div class="t-sb-block">
          <p class="t-sb-label">物品</p>
          <div class="t-sb-value" id="inventory"></div>
        </div>
        <div class="t-sb-block">
          <p class="t-sb-label">线索</p>
          <ul class="t-notes" id="notesList"></ul>
        </div>
        <div class="t-sb-block">
          <p class="t-sb-label">文本</p>
          <div class="t-sb-value" id="documentsList"></div>
        </div>
      </aside>
    </div>
  </div>
  <!-- Compatibility shim so state.js can write messageTextEl without errors -->
  <p id="messageText" hidden aria-hidden="true"></p>
  <!-- Overlay for archive / endings / chapter2 dialogue overlays -->
  <div id="overlayContainer" class="t-overlay-container" hidden></div>

  <script src="js/state.js"></script>
  <script src="js/scenes/base.js"></script>
  <script src="js/scenes/chapter2/shared.js"></script>
  <script src="js/scenes/menu.js"></script>
  <script src="js/scenes/chapter2/dialogue.js"></script>
  <script src="js/scenes/ground.js"></script>
  <script src="js/scenes/lobby.js"></script>
  <script src="js/scenes/upper.js"></script>
  <script src="js/scenes/escape_normal.js"></script>
  <script src="js/scenes/chapter2/entry.js"></script>
  <script src="js/scenes/chapter2/apartment.js"></script>
  <script src="js/scenes/endings.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
