<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day of Arrival</title>
  <meta name="description" content="An English point-and-click horror game prototype. Wake up in your car, return to the apartment, and search for a way out between nightmare and normalcy.">
  <meta name="theme-color" content="#07090d">
  <meta property="og:title" content="Day of Arrival">
  <meta property="og:description" content="An English point-and-click horror game prototype. Wake up in your car, return to the apartment, and search for a way out between nightmare and normalcy.">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="grain"></div>
  <main class="app">
    <header class="topbar">
      <div>
        <p class="eyebrow">Point & Click Horror</p>
        <h1>Day of Arrival</h1>
      </div>
      <div class="topbar-actions">
        <nav class="lang-switch" aria-label="Language switch">
          <a class="lang-link" href="index.html">中文</a>
          <a class="lang-link active" href="index-en.html">EN</a>
        </nav>
        <button id="menuButton" class="ghost-button" type="button">Main Menu</button>
        <button id="restartButton" class="ghost-button" type="button">Restart</button>
      </div>
    </header>

    <section class="hud">
      <div class="panel objective-panel">
        <p class="panel-label">Objective</p>
        <meta name="description" content="A text-adventure horror game. Wake up in your car, return to the apartment, and search for a way out between nightmare and normalcy.">
      </div>
      <div class="panel inventory-panel">
        <meta property="og:description" content="A text-adventure horror game. Wake up in your car, return to the apartment, and search for a way out between nightmare and normalcy.">
        <div id="inventory" class="inventory"></div>
      </div>
    </section>
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500&display=swap" rel="stylesheet">
    <section class="game-layout">
      <aside class="left-rail">
        <div class="panel notes-panel">
        <div class="t-app">
          <header class="t-header">
            <span class="t-brand">Day of Arrival</span>
            <div class="t-header-right">
              <nav class="t-lang">
                <a class="t-lang-link" href="index.html">中文</a>
                <span class="t-lang-sep">·</span>
                <a class="t-lang-link t-lang-active" href="index-en.html">EN</a>
              </nav>
              <button id="menuButton" class="t-btn" type="button">Menu</button>
              <button id="restartButton" class="t-btn" type="button">Restart</button>
            </div>
          </header>
          <div class="t-body">
            <div class="t-main">
              <div class="t-output" id="terminalOutput" aria-live="polite" aria-relevant="additions"></div>
              <div class="t-prompt-area">
                <div class="t-choices" id="terminalChoices"></div>
              </div>
            </div>
            <aside class="t-sidebar">
              <div class="t-sb-block">
                <p class="t-sb-label">Location</p>
                <p class="t-sb-value" id="sceneTitle">—</p>
              </div>
              <div class="t-sb-block">
                <p class="t-sb-label">Objective</p>
                <p class="t-sb-value" id="objectiveText">—</p>
              </div>
              <div class="t-sb-block">
                <p class="t-sb-label">Items</p>
                <div class="t-sb-value" id="inventory"></div>
              </div>
              <div class="t-sb-block">
                <p class="t-sb-label">Clues</p>
                <ul class="t-notes" id="notesList"></ul>
              </div>
              <div class="t-sb-block">
                <p class="t-sb-label">Texts</p>
                <div class="t-sb-value" id="documentsList"></div>
              </div>
            </aside>
          </div>
        </div>
        <p id="messageText" hidden aria-hidden="true"></p>
        <div id="overlayContainer" class="t-overlay-container" hidden></div>
